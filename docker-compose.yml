services:
  api:
    container_name: api
    depends_on:
      - postgres
    build:
      context: ./
    ports:
      - 3000:3000
      - 5555:5555
    volumes:
      - ./:/app
      - /app/node_modules
    env_file:
      - ./.env

  postgres:
    container_name: postgres
    image: postgres:15
    env_file:
      - ./.env
    expose:
      - 5432
    volumes:
      - pgdata:/var/lib/postgresql/data
volumes:
  pgdata:
